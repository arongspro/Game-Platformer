name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace Secrets
        # node 명령어를 사용해 network.js 파일 내부의 텍스트를 확실하게 교체합니다.
        run: |
          node -e "
          const fs = require('fs');
          const file = 'network.js'; // 만약 src 폴더 안에 있다면 'src/network.js'로 수정!
          let content = fs.readFileSync(file, 'utf8');
          content = content.replace('__VITE_FB_API_KEY__', '${{ secrets.VITE_FB_API_KEY }}');
          content = content.replace('__VITE_FB_AUTH_DOMAIN__', '${{ secrets.VITE_FB_AUTH_DOMAIN }}');
          content = content.replace('__VITE_FB_DATABASE_URL__', '${{ secrets.VITE_FB_DATABASE_URL }}');
          content = content.replace('__VITE_FB_PROJECT_ID__', '${{ secrets.VITE_FB_PROJECT_ID }}');
          content = content.replace('__VITE_FB_STORAGE_BUCKET__', '${{ secrets.VITE_FB_STORAGE_BUCKET }}');
          content = content.replace('__VITE_FB_MESSAGING_SENDER_ID__', '${{ secrets.VITE_FB_MESSAGING_SENDER_ID }}');
          content = content.replace('__VITE_FB_APP_ID__', '${{ secrets.VITE_FB_APP_ID }}');
          content = content.replace('__VITE_FB_MEASUREMENT_ID__', '${{ secrets.VITE_FB_MEASUREMENT_ID }}');
          fs.writeFileSync(file, content);
          "

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
